<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KidsCal">
<title>KidsCal 亲子日历</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{
  --surface-0:#f5f4f0;--surface-1:#efede8;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#5a5a56;--text-muted:#9a9994;
  --border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
  --accent:#7F77DD;--accent-light:#EEEDFE;--accent-text:#3C3489;
  --radius:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --surface-0:#1a1a18;--surface-1:#242420;--surface-2:#2e2e2a;
    --text-primary:#f0ede8;--text-secondary:#a8a49e;--text-muted:#6a6660;
    --border:rgba(255,255,255,0.1);--border-strong:rgba(255,255,255,0.18);
    --accent-light:#2a2748;--accent-text:#a09af0;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface-0);color:var(--text-primary);min-height:100vh;max-width:480px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface-2);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7F77DD,#D4537E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-name{font-size:16px;font-weight:600;color:var(--text-primary)}
.topbar-r{display:flex;align-items:center;gap:6px}
.lang-toggle{display:flex;background:var(--surface-1);border:0.5px solid var(--border);border-radius:20px;padding:2px;gap:2px}
.lang-btn{background:none;border:none;border-radius:16px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-muted)}
.lang-btn.active{background:var(--surface-2);color:var(--text-primary);font-weight:600;box-shadow:0 0 0 0.5px var(--border)}
.icon-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:18px}
.content{padding:14px 14px 100px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:600}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.chip.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text)}
.chip-dot{width:7px;height:7px;border-radius:50%}
.month-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-title{font-size:17px;font-weight:600;min-width:130px;text-align:center}
.nav-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius);width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px}
.today-btn{background:none;border:0.5px solid var(--accent);border-radius:var(--radius);padding:5px 12px;font-size:12px;cursor:pointer;color:var(--accent)}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.wd{text-align:center;font-size:11px;color:var(--text-muted);padding:3px 0;font-weight:500}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{min-height:68px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:8px;padding:5px;cursor:pointer;overflow:hidden}
.day.other{background:var(--surface-0);opacity:0.5}
.day.today{border:1.5px solid var(--accent)}
.day-num{font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:2px}
.today .day-num{color:var(--accent)}
.chip-ev{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.5}
.more-tag{font-size:9px;color:var(--text-muted)}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7F77DD,#D4537E);border:none;cursor:pointer;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(127,119,221,0.45);z-index:40}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface-2);border-radius:20px 20px 0 0;width:100%;padding:16px 18px 40px;max-height:90vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 14px}
.sheet h3{font-size:16px;font-weight:600;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;font-size:14px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);padding:9px 12px;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:56px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cpicker{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent}
.cdot.sel{border-color:var(--text-primary)}
.rrow{display:flex;gap:6px;flex-wrap:wrap}
.rbtn{background:none;border:0.5px solid var(--border-strong);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text-secondary)}
.rbtn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-text)}
.s-actions{display:flex;gap:8px;margin-top:16px;align-items:center}
.btn-del{background:none;border:0.5px solid #E24B4A;border-radius:var(--radius);padding:9px 14px;font-size:13px;cursor:pointer;color:#E24B4A;margin-right:auto}
.btn-cancel{background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text-secondary)}
.btn-save{background:linear-gradient(135deg,#7F77DD,#D4537E);border:none;border-radius:var(--radius);padding:9px 22px;font-size:13px;cursor:pointer;color:#fff;font-weight:600}
.detail-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row i{color:var(--text-muted);margin-top:1px;font-size:16px;flex-shrink:0}
.manage-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-calendar-star"></i></div>
    <span class="logo-name" id="appName">亲子日历</span>
  </div>
  <div class="topbar-r">
    <div class="lang-toggle">
      <button class="lang-btn active" id="lzh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="len" onclick="setLang('en')">EN</button>
    </div>
    <button class="icon-btn" onclick="openManage()"><i class="ti ti-users"></i></button>
  </div>
</div>

<div class="content">
  <div class="stats-row" id="stats"></div>
  <div class="chips-row" id="chips"></div>
  <div class="month-nav-row">
    <div class="month-nav">
      <button class="nav-btn" onclick="cm(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-title" id="mtitle"></span>
      <button class="nav-btn" onclick="cm(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <button class="today-btn" id="todayBtn" onclick="goToday()">今天</button>
  </div>
  <div class="weekdays" id="wds"></div>
  <div class="days-grid" id="grid"></div>
</div>

<button class="fab" onclick="openAdd()"><i class="ti ti-plus"></i></button>

<div class="overlay" id="addSheet">
  <div class="sheet">
    <div class="handle"></div>
    <h3 id="addTitle"></h3>
    <div class="fg"><label id="l-name"></label><input type="text" id="eName"></div>
    <div class="fg"><label id="l-child"></label><select id="eChild"></select></div>
    <div class="fg"><label id="l-date"></label><input type="date" id="eDate"></div>
    <div class="two-col">
      <div class="fg"><label id="l-start"></label><input type="time" id="eStart"></div>
      <div class="fg"><label id="l-end"></label><input type="time" id="eEnd"></div>
    </div>
    <div class="fg"><label id="l-loc"></label><input type="text" id="eLoc"></div>
    <div class="fg"><label id="l-color"></label><div class="cpicker" id="cpicker"></div></div>
    <div class="fg"><label id="l-repeat"></label><div class="rrow" id="rrow"></div></div>
    <div class="fg"><label id="l-note"></label><textarea id="eNote"></textarea></div>
    <div class="s-actions">
      <button class="btn-del" id="delbtn" style="display:none" onclick="delEvt()"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" id="cancelBtn" onclick="cls('addSheet')"></button>
      <button class="btn-save" id="saveBtn" onclick="saveEvt()"></button>
    </div>
  </div>
</div>

<div class="overlay" id="detailSheet">
  <div class="sheet">
    <div class="handle"></div>
    <h3 id="dName" style="margin-bottom:12px"></h3>
    <div id="dBody"></div>
    <div class="s-actions">
      <button class="btn-del" onclick="editFromDetail()"><i class="ti ti-edit"></i></button>
      <button class="btn-cancel" id="closeDetail" onclick="cls('detailSheet')"></button>
    </div>
  </div>
</div>

<div class="overlay" id="manageSheet">
  <div class="sheet">
    <div class="handle"></div>
    <h3 id="manageTitle"></h3>
    <div id="manageBody"></div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-save" id="addChildBtn" onclick="addChildPrompt()" style="width:100%;text-align:center"></button>
      <button class="btn-cancel" id="closeManage" onclick="cls('manageSheet')" style="width:100%;text-align:center"></button>
    </div>
  </div>
</div>

<script>
const T={
  zh:{app:'亲子日历',today:'今天',addAct:'添加活动',editAct:'编辑活动',
    name:'活动名称',child:'孩子',date:'日期',start:'开始时间',end:'结束时间',
    loc:'地点',color:'颜色',repeat:'重复',note:'备注',
    save:'保存',cancel:'取消',close:'关闭',
    all:'全部',addChild:'添加孩子',manage:'管理孩子',
    none:'不重复',weekly:'每周',biweekly:'每两周',monthly:'每月',
    totalEvt:'本月活动',thisWeek:'本周',children:'孩子数',
    nPh:'如：钢琴课、足球训练',lPh:'如：少年宫3楼',notePh:'备注、联系方式…',
    childPh:'输入孩子的名字',delConfirm:'确定删除此活动？',required:'请填写活动名称和日期',
    wds:['日','一','二','三','四','五','六'],
    months:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
  },
  en:{app:'KidsCal',today:'Today',addAct:'Add Activity',editAct:'Edit Activity',
    name:'Activity name',child:'Child',date:'Date',start:'Start',end:'End',
    loc:'Location',color:'Color',repeat:'Repeat',note:'Notes',
    save:'Save',cancel:'Cancel',close:'Close',
    all:'All',addChild:'Add child',manage:'Manage Children',
    none:'Once',weekly:'Weekly',biweekly:'Biweekly',monthly:'Monthly',
    totalEvt:'This month',thisWeek:'This week',children:'Children',
    nPh:'e.g. Piano, Soccer',lPh:'e.g. Community center',notePh:'Notes, contacts…',
    childPh:"Child's name",delConfirm:'Delete this activity?',required:'Please fill in name and date',
    wds:['Su','Mo','Tu','We','Th','Fr','Sa'],
    months:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
  }
};
const COLORS=[
  {bg:'#EEEDFE',tx:'#3C3489',dot:'#7F77DD'},
  {bg:'#FBEAF0',tx:'#993556',dot:'#D4537E'},
  {bg:'#E6F1FB',tx:'#185FA5',dot:'#378ADD'},
  {bg:'#E1F5EE',tx:'#0F6E56',dot:'#1D9E75'},
  {bg:'#FAEEDA',tx:'#854F0B',dot:'#EF9F27'},
  {bg:'#EAF3DE',tx:'#3B6D11',dot:'#639922'},
  {bg:'#FAECE7',tx:'#993C1D',dot:'#D85A30'},
  {bg:'#F1EFE8',tx:'#5F5E5A',dot:'#888780'},
];
const CDOTS=['#7F77DD','#D4537E','#378ADD','#1D9E75','#EF9F27','#D85A30'];
let S={lang:'zh',year:new Date().getFullYear(),month:new Date().getMonth(),
  events:[],children:['小明','小红'],activeChild:'all',
  editId:null,selColor:0,selRepeat:'none',detailId:null};

function t(k){return T[S.lang][k]||k}
function save(){try{localStorage.setItem('kidscal',JSON.stringify({events:S.events,children:S.children,lang:S.lang}));}catch(e){}}
function load(){
  try{const d=JSON.parse(localStorage.getItem('kidscal')||'{}');
    if(d.events)S.events=d.events;if(d.children)S.children=d.children;if(d.lang)S.lang=d.lang;
  }catch(e){}
  setLang(S.lang,true);render();
}
function setLang(l,silent){
  S.lang=l;
  document.getElementById('lzh').classList.toggle('active',l==='zh');
  document.getElementById('len').classList.toggle('active',l==='en');
  document.getElementById('appName').textContent=t('app');
  document.getElementById('todayBtn').textContent=t('today');
  document.getElementById('l-name').textContent=t('name');
  document.getElementById('l-child').textContent=t('child');
  document.getElementById('l-date').textContent=t('date');
  document.getElementById('l-start').textContent=t('start');
  document.getElementById('l-end').textContent=t('end');
  document.getElementById('l-loc').textContent=t('loc');
  document.getElementById('l-color').textContent=t('color');
  document.getElementById('l-repeat').textContent=t('repeat');
  document.getElementById('l-note').textContent=t('note');
  document.getElementById('cancelBtn').textContent=t('cancel');
  document.getElementById('saveBtn').textContent=t('save');
  document.getElementById('closeDetail').textContent=t('close');
  document.getElementById('manageTitle').textContent=t('manage');
  document.getElementById('addChildBtn').textContent='+ '+t('addChild');
  document.getElementById('closeManage').textContent=t('close');
  document.getElementById('eName').placeholder=t('nPh');
  document.getElementById('eLoc').placeholder=t('lPh');
  document.getElementById('eNote').placeholder=t('notePh');
  if(!silent){save();render();}
}
function render(){renderStats();renderChips();renderCal();}
function filtered(){return S.activeChild==='all'?S.events:S.events.filter(e=>e.child===S.activeChild);}
function expand(evts,y,m){
  const res=[],f=new Date(y,m,1),l=new Date(y,m+1,0);
  evts.forEach(ev=>{
    const b=new Date(ev.date);
    const push=d=>{if(d>=f&&d<=l)res.push({...ev,_d:new Date(d)});};
    if(!ev.repeat||ev.repeat==='none'){push(b);}
    else{let c=new Date(b);while(c<=l){push(new Date(c));
      if(ev.repeat==='weekly')c.setDate(c.getDate()+7);
      else if(ev.repeat==='biweekly')c.setDate(c.getDate()+14);
      else if(ev.repeat==='monthly')c.setMonth(c.getMonth()+1);
      else break;}}
  });
  return res;
}
function renderStats(){
  const all=expand(S.events,S.year,S.month);
  const now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  const tw=S.events.filter(e=>{const d=new Date(e.date);return d>=ws&&d<=we;});
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">${t('totalEvt')}</div></div>
    <div class="stat-card"><div class="stat-num">${tw.length}</div><div class="stat-label">${t('thisWeek')}</div></div>
    <div class="stat-card"><div class="stat-num">${S.children.length}</div><div class="stat-label">${t('children')}</div></div>`;
}
function renderChips(){
  let h=`<div class="chip${S.activeChild==='all'?' active':''}" onclick="fc('all')"><i class="ti ti-layout-grid" style="font-size:13px"></i>${t('all')}</div>`;
  S.children.forEach((c,i)=>{
    const dot=CDOTS[i%CDOTS.length],act=S.activeChild===c;
    h+=`<div class="chip${act?' active':''}" style="${act?`border-color:${dot};background:${dot}22;color:${dot}`:''}" onclick="fc('${c}')"><div class="chip-dot" style="background:${dot}"></div>${c}</div>`;
  });
  document.getElementById('chips').innerHTML=h;
}
function renderCal(){
  const mn=T[S.lang].months;
  document.getElementById('mtitle').textContent=S.lang==='zh'?`${S.year}年 ${mn[S.month]}`:`${mn[S.month]} ${S.year}`;
  document.getElementById('wds').innerHTML=T[S.lang].wds.map(d=>`<div class="wd">${d}</div>`).join('');
  const grid=document.getElementById('grid');grid.innerHTML='';
  const first=new Date(S.year,S.month,1).getDay();
  const dim=new Date(S.year,S.month+1,0).getDate();
  const prev=new Date(S.year,S.month,0).getDate();
  const today=new Date();
  const evts=expand(filtered(),S.year,S.month);
  const byDay={};evts.forEach(e=>{const d=e._d.getDate();if(!byDay[d])byDay[d]=[];byDay[d].push(e);});
  for(let i=0;i<first;i++){const d=prev-first+i+1;grid.innerHTML+=`<div class="day other"><div class="day-num">${d}</div></div>`;}
  for(let d=1;d<=dim;d++){
    const isT=today.getDate()===d&&today.getMonth()===S.month&&today.getFullYear()===S.year;
    const des=(byDay[d]||[]).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
    const show=des.slice(0,2),more=des.length-2;
    let chips=show.map(e=>{
      const c=COLORS[e.colorIdx||0];
      return `<div class="chip-ev" style="background:${c.bg};color:${c.tx}" onclick="event.stopPropagation();sd('${e.id}')" title="${e.name}">${e.startTime?e.startTime.slice(0,5)+' ':''}${e.name}</div>`;
    }).join('');
    if(more>0)chips+=`<div class="more-tag">+${more}</div>`;
    grid.innerHTML+=`<div class="day${isT?' today':''}" onclick="openAddDay(${d})"><div class="day-num">${d}</div>${chips}</div>`;
  }
  const rem=(first+dim)%7;if(rem>0)for(let i=1;i<=7-rem;i++)grid.innerHTML+=`<div class="day other"><div class="day-num">${i}</div></div>`;
}
function cm(d){S.month+=d;if(S.month>11){S.month=0;S.year++;}if(S.month<0){S.month=11;S.year--;}render();}
function goToday(){const n=new Date();S.year=n.getFullYear();S.month=n.getMonth();render();}
function fc(c){S.activeChild=c;render();}
function openAdd(date){
  S.editId=null;S.selColor=0;S.selRepeat='none';
  document.getElementById('addTitle').textContent=t('addAct');
  document.getElementById('delbtn').style.display='none';
  ['eName','eDate','eStart','eEnd','eLoc','eNote'].forEach(id=>document.getElementById(id).value='');
  if(date)document.getElementById('eDate').value=date;
  buildChildSel();buildCP();buildRR();
  document.getElementById('addSheet').classList.add('open');
}
function openAddDay(d){
  const ds=`${S.year}-${String(S.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  openAdd(ds);
}
function buildChildSel(){document.getElementById('eChild').innerHTML=S.children.map(c=>`<option value="${c}">${c}</option>`).join('');}
function buildCP(){
  document.getElementById('cpicker').innerHTML=COLORS.map((c,i)=>
    `<div class="cdot${S.selColor===i?' sel':''}" style="background:${c.dot}" onclick="pc(${i})"></div>`).join('');
}
function buildRR(){
  const keys=['none','weekly','biweekly','monthly'];
  document.getElementById('rrow').innerHTML=keys.map(k=>
    `<button class="rbtn${S.selRepeat===k?' active':''}" onclick="sr('${k}')">${t(k)}</button>`).join('');
}
function pc(i){S.selColor=i;buildCP();}
function sr(v){S.selRepeat=v;buildRR();}
function saveEvt(){
  const name=document.getElementById('eName').value.trim();
  const date=document.getElementById('eDate').value;
  if(!name||!date){alert(t('required'));return;}
  const ev={id:S.editId||('e'+Date.now()),name,child:document.getElementById('eChild').value,
    date,startTime:document.getElementById('eStart').value,endTime:document.getElementById('eEnd').value,
    location:document.getElementById('eLoc').value.trim(),note:document.getElementById('eNote').value.trim(),
    colorIdx:S.selColor,repeat:S.selRepeat};
  if(S.editId){const i=S.events.findIndex(e=>e.id===S.editId);if(i>=0)S.events[i]=ev;}
  else S.events.push(ev);
  save();cls('addSheet');render();
}
function delEvt(){
  if(confirm(t('delConfirm'))){S.events=S.events.filter(e=>e.id!==S.editId);save();cls('addSheet');render();}
}
function sd(id){
  const ev=S.events.find(e=>e.id===id);if(!ev)return;
  S.detailId=id;
  const c=COLORS[ev.colorIdx||0];
  document.getElementById('dName').textContent=ev.name;
  document.getElementById('dName').style.color=c.dot;
  const rl={weekly:t('weekly'),biweekly:t('biweekly'),monthly:t('monthly')};
  let h='';
  h+=dr('ti-user',ev.child);h+=dr('ti-calendar',ev.date);
  if(ev.startTime)h+=dr('ti-clock',ev.startTime+(ev.endTime?' – '+ev.endTime:''));
  if(ev.location)h+=dr('ti-map-pin',ev.location);
  if(ev.repeat&&ev.repeat!=='none')h+=dr('ti-repeat',rl[ev.repeat]||ev.repeat);
  if(ev.note)h+=dr('ti-notes',ev.note,true);
  document.getElementById('dBody').innerHTML=h;
  document.getElementById('detailSheet').classList.add('open');
}
function dr(icon,text,pre){return `<div class="detail-row"><i class="ti ${icon}"></i><span${pre?' style="white-space:pre-wrap"':''}>${text}</span></div>`;}
function editFromDetail(){
  const ev=S.events.find(e=>e.id===S.detailId);if(!ev)return;
  cls('detailSheet');
  S.editId=ev.id;S.selColor=ev.colorIdx||0;S.selRepeat=ev.repeat||'none';
  document.getElementById('addTitle').textContent=t('editAct');
  document.getElementById('delbtn').style.display='';
  document.getElementById('eName').value=ev.name;
  document.getElementById('eDate').value=ev.date;
  document.getElementById('eStart').value=ev.startTime||'';
  document.getElementById('eEnd').value=ev.endTime||'';
  document.getElementById('eLoc').value=ev.location||'';
  document.getElementById('eNote').value=ev.note||'';
  buildChildSel();document.getElementById('eChild').value=ev.child;
  buildCP();buildRR();
  document.getElementById('addSheet').classList.add('open');
}
function openManage(){renderManage();document.getElementById('manageSheet').classList.add('open');}
function renderManage(){
  let h='';
  S.children.forEach((c,i)=>{
    const dot=CDOTS[i%CDOTS.length];
    h+=`<div class="manage-item">
      <div class="avatar" style="background:${dot}22;color:${dot}">${c[0]}</div>
      <span style="flex:1;font-size:14px">${c}</span>
      <button onclick="renameChild('${c}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;margin-right:4px"><i class="ti ti-pencil"></i></button>
      <button onclick="removeChild('${c}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px"><i class="ti ti-x"></i></button>
    </div>`;
  });
  document.getElementById('manageBody').innerHTML=h||`<p style="color:var(--text-muted);font-size:13px;padding:12px 0">${S.lang==='zh'?'还没有孩子，快添加吧':'No children yet'}</p>`;
}
function renameChild(old){
  const newName=prompt(S.lang==='zh'?`将「${old}」改名为：`:`Rename "${old}" to:`,old);
  if(!newName||!newName.trim()||newName.trim()===old)return;
  if(S.children.includes(newName.trim())){alert(S.lang==='zh'?'名字已存在':'Name already exists');return;}
  S.children=S.children.map(c=>c===old?newName.trim():c);
  S.events=S.events.map(e=>e.child===old?{...e,child:newName.trim()}:e);
  if(S.activeChild===old)S.activeChild=newName.trim();
  save();renderManage();render();
}
function addChildPrompt(){
  const name=prompt(t('childPh'));
  if(name&&name.trim()&&!S.children.includes(name.trim())){
    S.children.push(name.trim());save();renderManage();render();
  }
}
function removeChild(c){
  if(!confirm(S.lang==='zh'?`确定移除 ${c}？`:`Remove ${c}?`))return;
  S.children=S.children.filter(x=>x!==c);
  if(S.activeChild===c)S.activeChild='all';
  save();renderManage();render();
}
function cls(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
load();
</script>
</body>
</html>
